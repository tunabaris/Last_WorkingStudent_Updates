<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SAP Careers - Working Student Jobs</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div class="header-content">
          <h1 id="mainTitle">SAP Opportunities</h1>
          <p class="subtitle">Explore working student roles tailored for you</p>
          <div class="company-tabs">
            <button id="tab-all" class="tab-btn active" data-company="all">All</button>
            <button id="tab-sap" class="tab-btn" data-company="sap">SAP</button>
            <button id="tab-teamviewer" class="tab-btn" data-company="teamviewer">TeamViewer</button>
            <button id="tab-porsche" class="tab-btn" data-company="porsche">Porsche</button>
          </div>
        </div>
        <div class="controls-container">
          <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search by title, location or department..." />
            <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </div>
          <button id="refreshBtn" class="refresh-btn" title="Run Scraper & Refresh Data">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6"></path><path d="M1 20v-6h6"></path><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
            <span>Refresh Jobs</span>
          </button>
        </div>
      </header>

      <main>
        <div class="stats-bar">
          <span id="jobCount">Loading jobs...</span>
        </div>
        
        <div id="jobsGrid" class="jobs-grid">
          <!-- Job cards will be injected here -->
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
